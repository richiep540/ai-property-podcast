name: Daily Podcast

on:
  schedule:
    # 06:30 UTC every day — edit the cron time if you'd like it earlier/later
    - cron: "30 6 * * *"
  workflow_dispatch: {}  # lets you also trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  build-episode:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate today's episode
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_TTS_API_KEY: ${{ secrets.GOOGLE_TTS_API_KEY }}
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
        run: python scripts/generate_episode.py

      - name: Commit and push new episode
        run: |
          git config user.name "podcast-bot"
          git config user.email "podcast-bot@users.noreply.github.com"
          git add docs/
          git commit -m "Add episode for $(date +'%Y-%m-%d')" || echo "Nothing to commit"
          git push
